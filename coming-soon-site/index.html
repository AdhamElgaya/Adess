<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Adess — classic and casual clothing. Our new experience is coming soon."
    />
    <title>Adess — Coming Soon</title>
    <!--
      Deploy on Vercel:
      1. Push this repo to GitHub/GitLab/Bitbucket.
      2. New Vercel Project → import the repo → set Root Directory to: coming-soon-site
      3. Framework Preset: Other (static). Deploy.

      Namecheap + Vercel:
      1. Vercel → Project → Settings → Domains → add your domain.
      2. Follow Vercel’s DNS instructions. Common: apex → A record to Vercel; www → CNAME to cname.vercel-dns.com
      3. In Namecheap: Domain → Advanced DNS → add those records (or use Namecheap DNS templates Vercel shows).

      Logo: add your file as coming-soon-site/images/logo.png (or change paths in script.js).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="page__bg" aria-hidden="true"></div>

      <div class="page__inner">
        <header class="logo-block">
          <img
            id="site-logo"
            class="logo-block__img"
            src="./images/logo.png"
            alt="Adess"
            width="180"
            decoding="async"
          />
          <h1 id="site-wordmark" class="logo-block__wordmark" hidden>Adess</h1>
        </header>

        <section class="hero">
          <p class="eyebrow">Coming soon</p>
          <h2 class="headline">
            Something beautiful
            <br />
            <span class="headline__muted">is on the way</span>
          </h2>
          <p class="lede">
            We are putting the finishing touches on our new experience. Leave your email and we will
            let you know when we launch.
          </p>

          <form id="subscribe-form" class="form" novalidate>
            <div class="form__row">
              <label class="sr-only" for="email">Email address</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                class="form__input"
                placeholder="Your email"
              />
              <button type="submit" class="form__btn">Subscribe</button>
            </div>
            <p id="form-message" class="form__message" role="status" hidden></p>
          </form>

          <div class="social">
            <p class="eyebrow eyebrow--tight">Follow us</p>
            <a
              id="instagram-link"
              class="social__link"
              href="https://www.instagram.com/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Adess on Instagram"
            >
              <svg class="social__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="1.25" />
                <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.25" />
                <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" />
              </svg>
            </a>
          </div>
        </section>

        <footer class="footer">
          <p class="footer__copy">&copy; <span id="year"></span> Adess. All rights reserved.</p>
        </footer>
      </div>
    </main>
    <script src="./script.js" defer></script>
  </body>
</html>
